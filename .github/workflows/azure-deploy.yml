name: Deploy ParkIn App to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Create .env file
      run: |
        echo "PORT=5000" > .env
        echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> .env
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
        echo "JWT_EXPIRE=7d" >> .env
        echo "NODE_ENV=production" >> .env
    
    - name: Deploy to Azure App Service (parkin-api)
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'parkin-api'
        publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
        package: .

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    defaults:
      run:
        working-directory: frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Create .env file
      run: |
        echo "VITE_API_URL=https://parkin-api.azurewebsites.net/api" > .env
    
    - name: Build frontend
      run: npm run build
    
    - name: Deploy to Azure App Service (parkin-web)
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'parkin-web'
        publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
        package: ./dist